<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新能源汽车维修大师</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }

        body {
            background: #f0f5ff;
            overflow: hidden;
        }

        /* 游戏容器 */
        .game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            background: linear-gradient(#87CEEB, #E0F7FA);
        }

        /* 游戏界面 */
        .game-screen {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* 开始界面 */
        .start-screen {
            z-index: 10;
            background: rgba(0,0,0,0.8);
            color: white;
            text-align: center;
        }

        .start-btn {
            padding: 15px 40px;
            font-size: 24px;
            background: #4CAF50;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            margin-top: 30px;
            transition: all 0.3s;
        }

        .start-btn:hover {
            background: #45a049;
            transform: scale(1.05);
        }

        /* 游戏主界面 */
        .main-screen {
            display: none;
        }

        /* 车辆区域 */
        .car-area {
            width: 80%;
            height: 50%;
            background: #f8f8f8;
            border-radius: 10px;
            margin: 20px auto;
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .car-image {
            width: 100%;
            height: 100%;
            background: url('https://img.icons8.com/fluency/96/000000/car--v2.png') no-repeat center;
            background-size: contain;
            position: relative;
        }

        /* 故障提示 */
        .fault-alert {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff5252;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 18px;
            display: none;
            z-index: 5;
        }

        /* 工具面板 */
        .tools-panel {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .tool-btn {
            width: 80px;
            height: 80px;
            border-radius: 10px;
            border: none;
            background: #e0e0e0;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            font-size: 12px;
        }

        .tool-btn:hover {
            background: #ff9800;
            transform: translateY(-5px);
        }

        .tool-btn.active {
            background: #4CAF50;
            color: white;
        }

        .tool-icon {
            font-size: 30px;
            margin-bottom: 5px;
        }

        /* 操作面板 */
        .actions-panel {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 10px 0;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 8px 15px;
            border-radius: 5px;
            border: none;
            background: #2196F3;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: #1976D2;
        }

        /* 状态栏 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            width: 80%;
            margin: 10px auto;
            font-size: 18px;
        }

        .score-display, .progress-display {
            background: white;
            padding: 8px 15px;
            border-radius: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* 完成提示 */
        .complete-modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            text-align: center;
            display: none;
            z-index: 20;
        }

        .restart-btn {
            margin-top: 20px;
            padding: 10px 25px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- 开始界面 -->
        <div class="game-screen start-screen" id="startScreen">
            <h1>新能源汽车维修大师</h1>
            <p>检测故障，选择正确工具，完成维修！</p>
            <button class="start-btn" id="startBtn">开始游戏</button>
        </div>

        <!-- 游戏主界面 -->
        <div class="game-screen main-screen" id="mainScreen">
            <!-- 状态栏 -->
            <div class="status-bar">
                <div class="score-display">积分: <span id="score">0</span></div>
                <div class="progress-display">维修进度: <span id="progress">0</span>%</div>
            </div>

            <!-- 车辆维修区域 -->
            <div class="car-area">
                <div class="fault-alert" id="faultAlert">检测到故障：电池电压异常</div>
                <div class="car-image" id="carImage"></div>
            </div>

            <!-- 工具面板 -->
            <div class="tools-panel">
                <button class="tool-btn" id="toolDetector" data-tool="detector">
                    <span class="tool-icon">🔍</span>
                    <span>故障检测仪</span>
                </button>
                <button class="tool-btn" id="toolBattery" data-tool="battery">
                    <span class="tool-icon">🔋</span>
                    <span>电池测试仪</span>
                </button>
                <button class="tool-btn" id="toolOBD" data-tool="obd">
                    <span class="tool-icon">💻</span>
                    <span>OBD诊断仪</span>
                </button>
                <button class="tool-btn" id="toolMultimeter" data-tool="multimeter">
                    <span class="tool-icon">📏</span>
                    <span>万用表</span>
                </button>
                <button class="tool-btn" id="toolWrench" data-tool="wrench">
                    <span class="tool-icon">🔧</span>
                    <span>维修工具包</span>
                </button>
            </div>

            <!-- 操作面板 -->
            <div class="actions-panel">
                <button class="action-btn" id="actionCheck">检测故障</button>
                <button class="action-btn" id="actionRepair">执行维修</button>
                <button class="action-btn" id="actionTest">测试车辆</button>
            </div>
        </div>

        <!-- 完成提示弹窗 -->
        <div class="complete-modal" id="completeModal">
            <h2>维修完成！</h2>
            <p>最终得分：<span id="finalScore">0</span></p>
            <button class="restart-btn" id="restartBtn">再来一局</button>
        </div>
    </div>

    <script>
        // 游戏核心数据
        const gameData = {
            score: 0,
            progress: 0,
            currentFault: null,
            selectedTool: null,
            // 故障列表 - 新能源汽车常见故障
            faults: [
                { id: 1, name: "电池电压异常", tool: "battery", repairSteps: ["检测电池参数", "校准电压", "重新充电"] },
                { id: 2, name: "电机控制器故障", tool: "obd", repairSteps: ["读取故障码", "重置控制器", "系统升级"] },
                { id: 3, name: "充电接口接触不良", tool: "multimeter", repairSteps: ["检测接口电压", "清洁触点", "紧固螺丝"] },
                { id: 4, name: "高压线路故障", tool: "detector", repairSteps: ["绝缘检测", "更换线束", "耐压测试"] },
                { id: 5, name: "冷却系统故障", tool: "wrench", repairSteps: ["检查冷却液", "更换水泵", "系统排气"] }
            ]
        };

        // DOM元素
        const elements = {
            startScreen: document.getElementById('startScreen'),
            mainScreen: document.getElementById('mainScreen'),
            startBtn: document.getElementById('startBtn'),
            restartBtn: document.getElementById('restartBtn'),
            faultAlert: document.getElementById('faultAlert'),
            scoreDisplay: document.getElementById('score'),
            progressDisplay: document.getElementById('progress'),
            completeModal: document.getElementById('completeModal'),
            finalScore: document.getElementById('finalScore'),
            toolButtons: document.querySelectorAll('.tool-btn'),
            actionCheck: document.getElementById('actionCheck'),
            actionRepair: document.getElementById('actionRepair'),
            actionTest: document.getElementById('actionTest')
        };

        // 初始化游戏
        function initGame() {
            gameData.score = 0;
            gameData.progress = 0;
            gameData.currentFault = null;
            gameData.selectedTool = null;

            // 更新UI
            updateScore();
            updateProgress();
            hideFaultAlert();
            
            // 重置工具选择
            elements.toolButtons.forEach(btn => btn.classList.remove('active'));
            
            // 隐藏完成弹窗
            elements.completeModal.style.display = 'none';
        }

        // 随机生成故障
        function generateRandomFault() {
            const randomIndex = Math.floor(Math.random() * gameData.faults.length);
            gameData.currentFault = gameData.faults[randomIndex];
            showFaultAlert(gameData.currentFault.name);
        }

        // 显示故障提示
        function showFaultAlert(faultName) {
            elements.faultAlert.textContent = `检测到故障：${faultName}`;
            elements.faultAlert.style.display = 'block';
        }

        // 隐藏故障提示
        function hideFaultAlert() {
            elements.faultAlert.style.display = 'none';
        }

        // 更新积分显示
        function updateScore() {
            elements.scoreDisplay.textContent = gameData.score;
        }

        // 更新进度显示
        function updateProgress() {
            elements.progressDisplay.textContent = gameData.progress;
        }

        // 选择工具
        function selectTool(toolId) {
            // 重置所有工具状态
            elements.toolButtons.forEach(btn => btn.classList.remove('active'));
            
            // 设置当前选中工具
            gameData.selectedTool = toolId;
            document.querySelector(`[data-tool="${toolId}"]`).classList.add('active');
        }

        // 检测故障操作
        function checkFault() {
            if (!gameData.currentFault) {
                generateRandomFault();
                gameData.score += 10;
                updateScore();
            } else {
                alert('已检测到故障，请选择合适的工具进行维修！');
            }
        }

        // 执行维修操作
        function repairFault() {
            if (!gameData.currentFault) {
                alert('请先检测故障！');
                return;
            }

            if (!gameData.selectedTool) {
                alert('请先选择维修工具！');
                return;
            }

            // 验证工具是否正确
            if (gameData.selectedTool === gameData.currentFault.tool) {
                // 维修成功
                gameData.progress += 50;
                if (gameData.progress >= 100) gameData.progress = 100;
                gameData.score += 50;
                
                updateProgress();
                updateScore();
                
                alert(`维修成功！已完成${gameData.currentFault.repairSteps.join(' → ')}`);
                
                // 维修完成判断
                if (gameData.progress >= 100) {
                    completeRepair();
                } else {
                    hideFaultAlert();
                    gameData.currentFault = null;
                }
            } else {
                // 维修失败
                gameData.score -= 20;
                if (gameData.score < 0) gameData.score = 0;
                updateScore();
                alert(`维修失败！${gameData.currentFault.name}需要使用${document.querySelector(`[data-tool="${gameData.currentFault.tool}"]`).querySelector('span:last-child').textContent}`);
            }
        }

        // 测试车辆
        function testVehicle() {
            if (gameData.progress >= 100) {
                alert('车辆测试通过！性能恢复正常。');
                completeRepair();
            } else if (gameData.currentFault) {
                alert('车辆仍有故障，请完成维修后再测试！');
            } else {
                alert('未检测到故障，车辆状态正常！');
                gameData.score += 10;
                updateScore();
            }
        }

        // 完成维修
        function completeRepair() {
            elements.finalScore.textContent = gameData.score;
            elements.completeModal.style.display = 'block';
        }

        // 事件监听
        function setupEventListeners() {
            // 开始游戏
            elements.startBtn.addEventListener('click', () => {
                elements.startScreen.style.display = 'none';
                elements.mainScreen.style.display = 'flex';
                initGame();
            });

            // 重新开始
            elements.restartBtn.addEventListener('click', () => {
                initGame();
            });

            // 工具选择
            elements.toolButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    selectTool(btn.dataset.tool);
                });
            });

            // 操作按钮
            elements.actionCheck.addEventListener('click', checkFault);
            elements.actionRepair.addEventListener('click', repairFault);
            elements.actionTest.addEventListener('click', testVehicle);
        }

        // 启动游戏
        setupEventListeners();
    </script>
</body>
</html>
