<!DOCTYPE html>
<html lang="zh-CN">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>拓扑学动画 - 豆包</title>
<style>
*{box-sizing:border-box}
body{background:#f7f9fa;padding:20px;font-family:system-ui,-apple-system,Segoe UI,Roboto}
.container{max-width:900px;margin:0 auto;background:#fff;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.08);overflow:hidden}
.header{padding:24px;text-align:center;border-bottom:1px solid #eee}
.header h1{margin:0;font-size:24px;color:#222}
.header p{color:#666;margin-top:8px}
.main{padding:24px}
.canvas-box{position:relative;width:100%;height:420px;background:#fafbfc;border-radius:12px;overflow:hidden}
canvas{width:100%;height:100%}
.controls{display:flex;gap:12px;justify-content:center;margin-top:16px;flex-wrap:wrap}
button{padding:10px 16px;border-radius:8px;border:none;background:#3b82f6;color:white;font-weight:500;cursor:pointer}
button.sec{background:#94a3b8}
button:hover{opacity:.9}
.info{margin-top:20px;padding:16px;background:#eff6ff;border-radius:12px;color:#1e40af}
.info h3{margin:0 0 8px;font-size:16px}
.info p{margin:4px 0;color:#2563eb}
</style>

<div class="container">
  <div class="header">
    <h1>拓扑学 · 核心概念动画</h1>
    <p>不看长短大小，只看连接与洞数 | 橡皮泥几何学</p>
  </div>
  <div class="main">
    <div class="canvas-box">
      <canvas id="c"></canvas>
    </div>
    <div class="controls">
      <button onclick="showBall()">球 ↔ 正方体</button>
      <button onclick="showDonut()">甜甜圈 ↔ 咖啡杯</button>
      <button onclick="showMobius()">莫比乌斯带</button>
      <button class="sec" onclick="reset()">重置</button>
    </div>
    <div class="info" id="info">
      <h3>拓扑学一句话</h3>
      <p>拉伸、弯曲、压缩都可以；撕裂、粘合、打洞才算变。</p>
      <p>洞的数量（亏格）是最关键的拓扑不变量。</p>
    </div>
  </div>
</div>

<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
function resize(){c.width=c.offsetWidth;c.height=c.offsetHeight}
window.addEventListener('resize',resize)
resize();

let mode = 'ball';
let t = 0;
let req = null;

function reset(){
  mode='ball';t=0;
  document.getElementById('info').innerHTML=`
  <h3>拓扑学一句话</h3>
  <p>拉伸、弯曲、压缩都可以；撕裂、粘合、打洞才算变。</p>
  <p>洞的数量（亏格）是最关键的拓扑不变量。</p>`;
  cancelAnimationFrame(req);loop();
}

function showBall(){
  mode='ball';t=0;
  document.getElementById('info').innerHTML=`
  <h3>球面拓扑（0个洞）</h3>
  <p>球、正方体、四面体拓扑等价。</p>
  <p>怎么捏都还是 0 个洞。</p>`;
}

function showDonut(){
  mode='donut';t=0;
  document.getElementById('info').innerHTML=`
  <h3>环面拓扑（1个洞）</h3>
  <p>咖啡杯 ↔ 甜甜圈：拓扑完全一样。</p>
  <p>都只有 1 个洞，不撕不粘就能互变。</p>`;
}

function showMobius(){
  mode='mobius';t=0;
  document.getElementById('info').innerHTML=`
  <h3>莫比乌斯带</h3>
  <p>只有 1 个面、1 条边。</p>
  <p>不分正反面，经典单侧曲面。</p>`;
}

function loop(){
  ctx.clearRect(0,0,c.width,c.height);
  const cx = c.width/2|0;
  const cy = c.height/2|0;
  if(mode==='ball') drawBall(cx,cy);
  if(mode==='donut') drawDonut(cx,cy);
  if(mode==='mobius') drawMobius(cx,cy);
  t+=0.02;
  req=requestAnimationFrame(loop);
}

function drawBall(cx,cy){
  const k = 0.5 + 0.3*Math.sin(t*3);
  ctx.save();
  ctx.translate(cx,cy);
  ctx.beginPath();
  for(let i=0;i<Math.PI*2;i+=0.05){
    const r = 120*(1 + 0.2*Math.sin(i*6 + t*2));
    const x = r*Math.cos(i)*k;
    const y = r*Math.sin(i);
    ctx.lineTo(x,y);
  }
  ctx.closePath();
  ctx.fillStyle='#3b82f688';
  ctx.strokeStyle='#3b82f6';
  ctx.lineWidth=3;
  ctx.fill();
  ctx.stroke();
  ctx.restore();
}

function drawDonut(cx,cy){
  ctx.save();
  ctx.translate(cx,cy);
  ctx.rotate(t*0.4);
  ctx.lineWidth=3;
  ctx.strokeStyle='#ec4899';
  for(let j=0;j<Math.PI*2;j+=0.3){
    ctx.beginPath();
    for(let i=0;i<Math.PI*2;i+=0.05){
      const R = 90;
      const r = 40 + 5*Math.sin(t*2+i*3);
      const x = (R + r*Math.cos(i))*Math.cos(j);
      const y = (R + r*Math.cos(i))*Math.sin(j);
      const z = r*Math.sin(i);
      ctx.lineTo(x*0.9,y*0.7+z*0.4);
    }
    ctx.closePath();
    ctx.stroke();
  }
  ctx.restore();
}

function drawMobius(cx,cy){
  ctx.save();
  ctx.translate(cx,cy);
  ctx.rotate(t*0.3);
  ctx.strokeStyle='#10b981';
  ctx.lineWidth=4;
  ctx.beginPath();
  for(let i=0;i<Math.PI*2+0.1;i+=0.03){
    const r = 110;
    const twist = i*1 + t*1;
    const w = 25*Math.sin(twist);
    const h = 25*Math.cos(twist);
    const x = r*Math.cos(i) + w*Math.cos(i + Math.PI/2);
    const y = r*Math.sin(i) + h*0.6;
    ctx.lineTo(x,y);
  }
  ctx.stroke();
  ctx.restore();
}

loop();
</script>
</html>
