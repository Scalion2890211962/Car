<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>傅里叶变换可视化小游戏</title>
    <script src="https://cdn.jsdelivr.net/npm/h5.js@0.0.3/dist/h5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/numpy@1.26.3/+esm"></script>
    <script src="https://cdn.jsdelivr.net/npm/hdf5@0.10.3/dist/hdf5.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .game-title {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .freq-control {
            flex: 1;
            min-width: 200px;
        }
        .freq-control h4 {
            color: #34495e;
            margin-bottom: 10px;
        }
        .slider {
            width: 100%;
            margin: 10px 0;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: #3498db;
            color: white;
            font-size: 14px;
            transition: background 0.3s;
        }
        button:hover {
            background: #2980b9;
        }
        button.reset {
            background: #e74c3c;
        }
        button.reset:hover {
            background: #c0392b;
        }
        button.save {
            background: #2ecc71;
        }
        button.save:hover {
            background: #27ae60;
        }
        .plots {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        .plot-container {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px;
        }
        .plot-title {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 16px;
        }
        canvas {
            width: 100%;
            height: 300px;
        }
        .score-panel {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            text-align: center;
        }
        .score-panel h3 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .score {
            font-size: 24px;
            color: #e67e22;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="game-title">傅里叶变换可视化小游戏 🎮</h1>
        
        <!-- 控制面板 -->
        <div class="controls">
            <div class="freq-control">
                <h4>频率1 (5Hz) - 幅度调节</h4>
                <input type="range" class="slider" id="amp1" min="0" max="2" step="0.1" value="1">
                <p>当前幅度: <span id="amp1-val">1.0</span></p>
                
                <h4>频率1 - 相位调节 (弧度)</h4>
                <input type="range" class="slider" id="phase1" min="0" max="6.28" step="0.01" value="0">
                <p>当前相位: <span id="phase1-val">0.0</span></p>
            </div>
            
            <div class="freq-control">
                <h4>频率2 (20Hz) - 幅度调节</h4>
                <input type="range" class="slider" id="amp2" min="0" max="2" step="0.1" value="0.7">
                <p>当前幅度: <span id="amp2-val">0.7</span></p>
                
                <h4>频率2 - 相位调节 (弧度)</h4>
                <input type="range" class="slider" id="phase2" min="0" max="6.28" step="0.01" value="0">
                <p>当前相位: <span id="phase2-val">0.0</span></p>
            </div>
            
            <div class="freq-control">
                <h4>频率3 (40Hz) - 幅度调节</h4>
                <input type="range" class="slider" id="amp3" min="0" max="2" step="0.1" value="0">
                <p>当前幅度: <span id="amp3-val">0.0</span></p>
                
                <h4>频率3 - 相位调节 (弧度)</h4>
                <input type="range" class="slider" id="phase3" min="0" max="6.28" step="0.01" value="0">
                <p>当前相位: <span id="phase3-val">0.0</span></p>
            </div>
            
            <div class="freq-control">
                <h4>噪声强度</h4>
                <input type="range" class="slider" id="noise" min="0" max="0.5" step="0.01" value="0.1">
                <p>当前噪声: <span id="noise-val">0.1</span></p>
                
                <div class="btn-group">
                    <button id="generate">生成信号</button>
                    <button id="fft-btn">计算FFT</button>
                    <button id="reset" class="reset">重置参数</button>
                    <button id="save-h5" class="save">保存到H5</button>
                </div>
            </div>
        </div>
        
        <!-- 绘图区域 -->
        <div class="plots">
            <div class="plot-container">
                <h3 class="plot-title">时域信号 (傅里叶合成)</h3>
                <canvas id="time-domain"></canvas>
            </div>
            <div class="plot-container">
                <h3 class="plot-title">频域幅度谱 (FFT)</h3>
                <canvas id="freq-domain"></canvas>
            </div>
        </div>
        
        <!-- 分数面板（游戏化元素） -->
        <div class="score-panel">
            <h3>匹配度评分 (越接近100越好)</h3>
            <div class="score" id="score">0</div>
            <p>评分规则：手动调节的频率成分与FFT计算结果的匹配度</p>
        </div>
    </div>

    <script>
        // 全局变量
        let timeData = [];       // 时间轴数据
        let signalData = [];     // 合成的时域信号
        let freqData = [];       // 频率轴数据
        let ampSpectrum = [];    // FFT幅度谱
        const fs = 1000;         // 采样频率
        const duration = 2;      // 信号时长
        let ctxTime, ctxFreq;    // 画布上下文
        
        // 初始化画布
        function initCanvas() {
            const timeCanvas = document.getElementById('time-domain');
            const freqCanvas = document.getElementById('freq-domain');
            ctxTime = timeCanvas.getContext('2d');
            ctxFreq = freqCanvas.getContext('2d');
            
            // 设置画布实际分辨率（避免模糊）
            timeCanvas.width = timeCanvas.offsetWidth * 2;
            timeCanvas.height = timeCanvas.offsetHeight * 2;
            freqCanvas.width = freqCanvas.offsetWidth * 2;
            freqCanvas.height = freqCanvas.offsetHeight * 2;
            
            // 缩放上下文
            ctxTime.scale(2, 2);
            ctxFreq.scale(2, 2);
        }
        
        // 生成时间轴
        function generateTimeAxis() {
            const n = fs * duration;
            timeData = new Array(n);
            for (let i = 0; i < n; i++) {
                timeData[i] = i / fs;
            }
        }
        
        // 生成合成信号
        function generateSignal() {
            // 获取调节参数
            const amp1 = parseFloat(document.getElementById('amp1').value);
            const phase1 = parseFloat(document.getElementById('phase1').value);
            const amp2 = parseFloat(document.getElementById('amp2').value);
            const phase2 = parseFloat(document.getElementById('phase2').value);
            const amp3 = parseFloat(document.getElementById('amp3').value);
            const phase3 = parseFloat(document.getElementById('phase3').value);
            const noise = parseFloat(document.getElementById('noise').value);
            
            // 更新显示值
            document.getElementById('amp1-val').textContent = amp1.toFixed(1);
            document.getElementById('phase1-val').textContent = phase1.toFixed(2);
            document.getElementById('amp2-val').textContent = amp2.toFixed(1);
            document.getElementById('phase2-val').textContent = phase2.toFixed(2);
            document.getElementById('amp3-val').textContent = amp3.toFixed(1);
            document.getElementById('phase3-val').textContent = phase3.toFixed(2);
            document.getElementById('noise-val').textContent = noise.toFixed(2);
            
            // 生成合成信号
            const n = timeData.length;
            signalData = new Array(n);
            for (let i = 0; i < n; i++) {
                const t = timeData[i];
                // 三个频率的正弦波叠加
                let val = amp1 * Math.sin(2 * Math.PI * 5 * t + phase1) +
                          amp2 * Math.sin(2 * Math.PI * 20 * t + phase2) +
                          amp3 * Math.sin(2 * Math.PI * 40 * t + phase3);
                // 添加噪声
                val += noise * (Math.random() * 2 - 1);
                signalData[i] = val;
            }
            
            // 绘制时域信号
            drawTimeDomain();
            // 重置频域图
            ctxFreq.clearRect(0, 0, ctxFreq.canvas.width/2, ctxFreq.canvas.height/2);
            // 重置评分
            document.getElementById('score').textContent = "0";
        }
        
        // 简单的FFT实现（简化版，适合前端）
        function fft(signal) {
            const n = signal.length;
            if (n <= 1) return signal;
            
            // 分治
            const even = [];
            const odd = [];
            for (let i = 0; i < n; i++) {
                if (i % 2 === 0) even.push(signal[i]);
                else odd.push(signal[i]);
            }
            
            const evenFFT = fft(even);
            const oddFFT = fft(odd);
            
            // 合并
            const result = new Array(n);
            for (let k = 0; k < n/2; k++) {
                const t = Math.exp(-2 * Math.PI * 1i * k / n) * oddFFT[k];
                result[k] = evenFFT[k] + t;
                result[k + n/2] = evenFFT[k] - t;
            }
            return result;
        }
        
        // 计算并绘制FFT
        function calculateFFT() {
            if (signalData.length === 0) {
                alert("请先生成信号！");
                return;
            }
            
            const n = signalData.length;
            // 执行FFT
            const fftResult = fft(signalData);
            
            // 生成频率轴
            freqData = new Array(n/2);
            for (let i = 0; i < n/2; i++) {
                freqData[i] = i * fs / n;
            }
            
            // 计算幅度谱
            ampSpectrum = new Array(n/2);
            for (let i = 0; i < n/2; i++) {
                ampSpectrum[i] = 2.0 / n * Math.hypot(fftResult[i].real, fftResult[i].imag);
            }
            
            // 绘制频域谱
            drawFreqDomain();
            // 计算评分
            calculateScore();
        }
        
        // 绘制时域信号
        function drawTimeDomain() {
            const canvas = ctxTime.canvas;
            const width = canvas.width / 2;
            const height = canvas.height / 2;
            
            // 清空画布
            ctxTime.clearRect(0, 0, width, height);
            
            // 设置样式
            ctxTime.strokeStyle = '#3498db';
            ctxTime.lineWidth = 2;
            ctxTime.fillStyle = '#2c3e50';
            
            // 绘制坐标轴
            ctxTime.beginPath();
            ctxTime.moveTo(0, height/2);
            ctxTime.lineTo(width, height/2);
            ctxTime.moveTo(0, 0);
            ctxTime.lineTo(0, height);
            ctxTime.strokeStyle = '#ddd';
            ctxTime.stroke();
            
            // 绘制信号
            ctxTime.beginPath();
            const xScale = width / (duration);
            const yScale = height / 6;  // 缩放系数，适配画布
            
            for (let i = 0; i < signalData.length; i++) {
                const x = timeData[i] * xScale;
                const y = height/2 - signalData[i] * yScale;
                if (i === 0) ctxTime.moveTo(x, y);
                else ctxTime.lineTo(x, y);
            }
            
            ctxTime.strokeStyle = '#3498db';
            ctxTime.stroke();
        }
        
        // 绘制频域谱
        function drawFreqDomain() {
            const canvas = ctxFreq.canvas;
            const width = canvas.width / 2;
            const height = canvas.height / 2;
            
            // 清空画布
            ctxFreq.clearRect(0, 0, width, height);
            
            // 设置样式
            ctxFreq.strokeStyle = '#e74c3c';
            ctxFreq.lineWidth = 2;
            ctxFreq.fillStyle = '#2c3e50';
            
            // 绘制坐标轴
            ctxFreq.beginPath();
            ctxFreq.moveTo(0, height/2);
            ctxFreq.lineTo(width, height/2);
            ctxFreq.moveTo(0, 0);
            ctxFreq.lineTo(0, height);
            ctxFreq.strokeStyle = '#ddd';
            ctxFreq.stroke();
            
            // 绘制幅度谱（只显示0-50Hz）
            ctxFreq.beginPath();
            const xScale = width / 50;  // 只显示0-50Hz
            const yScale = height / 2;  // 缩放系数
            
            for (let i = 0; i < freqData.length && freqData[i] <= 50; i++) {
                const x = freqData[i] * xScale;
                const y = height/2 - ampSpectrum[i] * yScale;
                if (i === 0) ctxFreq.moveTo(x, y);
                else ctxFreq.lineTo(x, y);
            }
            
            ctxFreq.strokeStyle = '#e74c3c';
            ctxFreq.stroke();
            
            // 标记关键频率点
            const freqMarks = [5, 20, 40];
            ctxFreq.fillStyle = '#e74c3c';
            freqMarks.forEach(freq => {
                const x = freq * xScale;
                ctxFreq.beginPath();
                ctxFreq.arc(x, height/2, 5, 0, 2 * Math.PI);
                ctxFreq.fill();
                ctxFreq.fillText(freq + "Hz", x-10, height/2 + 20);
            });
        }
        
        // 计算匹配度评分
        function calculateScore() {
            // 获取手动调节的幅度
            const amp1 = parseFloat(document.getElementById('amp1').value);
            const amp2 = parseFloat(document.getElementById('amp2').value);
            const amp3 = parseFloat(document.getElementById('amp3').value);
            
            // 找到对应频率的FFT幅度
            let fftAmp1 = 0, fftAmp2 = 0, fftAmp3 = 0;
            for (let i = 0; i < freqData.length; i++) {
                if (Math.abs(freqData[i] - 5) < 0.5) fftAmp1 = ampSpectrum[i];
                if (Math.abs(freqData[i] - 20) < 0.5) fftAmp2 = ampSpectrum[i];
                if (Math.abs(freqData[i] - 40) < 0.5) fftAmp3 = ampSpectrum[i];
            }
            
            // 计算匹配度（归一化）
            const totalManual = amp1 + amp2 + amp3;
            const totalFFT = fftAmp1 + fftAmp2 + fftAmp3;
            
            let score = 0;
            if (totalManual > 0 && totalFFT > 0) {
                const match1 = Math.min(amp1/totalManual, fftAmp1/totalFFT) / Math.max(amp1/totalManual, fftAmp1/totalFFT);
                const match2 = Math.min(amp2/totalManual, fftAmp2/totalFFT) / Math.max(amp2/totalManual, fftAmp2/totalFFT);
                const match3 = Math.min(amp3/totalManual, fftAmp3/totalFFT) / Math.max(amp3/totalManual, fftAmp3/totalFFT);
                score = Math.round((match1 + match2 + match3) / 3 * 100);
            }
            
            // 更新评分
            document.getElementById('score').textContent = score;
        }
        
        // 保存数据到H5文件
        async function saveToH5() {
            if (signalData.length === 0) {
                alert("请先生成信号！");
                return;
            }
            
            try {
                // 创建HDF5文件
                const file = new hdf5.File('fourier_game.h5', 'w');
                
                // 创建数据集
                file.createDataset('time', timeData);
                file.createDataset('signal', signalData);
                file.createDataset('frequency', freqData);
                file.createDataset('amplitude_spectrum', ampSpectrum);
                
                // 添加元数据
                file.attrs['sampling_frequency'] = fs;
                file.attrs['duration'] = duration;
                file.attrs['amp1'] = parseFloat(document.getElementById('amp1').value);
                file.attrs['amp2'] = parseFloat(document.getElementById('amp2').value);
                file.attrs['amp3'] = parseFloat(document.getElementById('amp3').value);
                
                // 保存文件到本地
                const blob = await file.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'fourier_game.h5';
                a.click();
                URL.revokeObjectURL(url);
                
                alert("数据已保存为 fourier_game.h5！");
            } catch (e) {
                alert("保存失败：" + e.message);
            }
        }
        
        // 重置参数
        function resetParams() {
            document.getElementById('amp1').value = 1;
            document.getElementById('phase1').value = 0;
            document.getElementById('amp2').value = 0.7;
            document.getElementById('phase2').value = 0;
            document.getElementById('amp3').value = 0;
            document.getElementById('phase3').value = 0;
            document.getElementById('noise').value = 0.1;
            
            // 更新显示值
            document.getElementById('amp1-val').textContent = "1.0";
            document.getElementById('phase1-val').textContent = "0.00";
            document.getElementById('amp2-val').textContent = "0.7";
            document.getElementById('phase2-val').textContent = "0.00";
            document.getElementById('amp3-val').textContent = "0.0";
            document.getElementById('phase3-val').textContent = "0.00";
            document.getElementById('noise-val').textContent = "0.10";
            
            // 清空画布
            ctxTime.clearRect(0, 0, ctxTime.canvas.width/2, ctxTime.canvas.height/2);
            ctxFreq.clearRect(0, 0, ctxFreq.canvas.width/2, ctxFreq.canvas.height/2);
            document.getElementById('score').textContent = "0";
            
            // 清空数据
            signalData = [];
            freqData = [];
            ampSpectrum = [];
        }
        
        // 初始化
        window.onload = function() {
            initCanvas();
            generateTimeAxis();
            
            // 绑定事件
            document.getElementById('generate').addEventListener('click', generateSignal);
            document.getElementById('fft-btn').addEventListener('click', calculateFFT);
            document.getElementById('reset').addEventListener('click', resetParams);
            document.getElementById('save-h5').addEventListener('click', saveToH5);
            
            // 实时更新滑块值
            const sliders = document.querySelectorAll('.slider');
            sliders.forEach(slider => {
                slider.addEventListener('input', function() {
                    const valElem = document.getElementById(this.id + '-val');
                    if (valElem) {
                        valElem.textContent = this.value;
                    }
                });
            });
        };
    </script>
</body>
</html>
